<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Espace — MethodAdmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#1a56db;--blue-hover:#1240b0;--blue-light:#e8f0fe;--dark:#0f172a;--gray:#475569;--bg:#f7f8fc;--white:#fff;--border:#e2e8f0;--radius:10px;--radius-lg:20px; }
    body { font-family:'Nunito Sans',system-ui,sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; }
    header { background:white; border-bottom:1px solid var(--border); padding:0 1.5rem; display:flex; align-items:center; height:64px; gap:1rem; position:sticky; top:0; z-index:50; }
    .logo { font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:1.1rem; color:var(--blue); text-decoration:none; }
    .logo span { color:var(--dark); }
    .user-info { margin-left:auto; display:flex; align-items:center; gap:.75rem; }
    .user-badge { font-size:.83rem; color:var(--gray); }
    .btn-logout { font-size:.82rem; color:var(--gray); border:1px solid var(--border); border-radius:var(--radius); padding:.35rem .8rem; cursor:pointer; background:none; font-family:inherit; transition:.15s; }
    .btn-logout:hover { border-color:#ef4444; color:#ef4444; }
    .layout { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 64px); }
    .sidebar { background:var(--dark); padding:1.5rem 0; }
    .sidebar-item { display:flex; align-items:center; gap:.65rem; padding:.7rem 1.25rem; font-size:.87rem; color:#94a3b8; cursor:pointer; transition:.15s; border-left:3px solid transparent; }
    .sidebar-item:hover { color:white; background:rgba(255,255,255,.06); }
    .sidebar-item.active { color:white; border-left-color:var(--blue); background:rgba(26,86,219,.15); }
    .sidebar-section { font-size:.7rem; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:.08em; padding:.5rem 1.25rem; margin-top:1rem; }
    .content { padding:2rem; max-width:900px; }
    .page { display:none; }
    .page.active { display:block; }
    .page-title { font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:1.4rem; color:var(--dark); margin-bottom:1.5rem; }
    .card { background:white; border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; margin-bottom:1rem; }
    .dossier-card { background:white; border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem 1.5rem; margin-bottom:.75rem; display:flex; align-items:center; gap:1rem; cursor:pointer; transition:.15s; }
    .dossier-card:hover { border-color:var(--blue); box-shadow:0 2px 12px rgba(26,86,219,.08); }
    .dossier-ref { font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:.95rem; color:var(--dark); }
    .dossier-service { font-size:.8rem; color:var(--gray); margin-top:.2rem; }
    .badge { display:inline-block; padding:.25rem .65rem; border-radius:20px; font-size:.73rem; font-weight:700; }
    .badge-nouvelle { background:#fef3c7; color:#92400e; }
    .badge-en_etude { background:#dbeafe; color:#1e40af; }
    .badge-devis_envoye { background:#ede9fe; color:#5b21b6; }
    .badge-devis_valide { background:#d1fae5; color:#065f46; }
    .badge-docs_attente { background:#fce7f3; color:#9d174d; }
    .badge-en_traitement { background:#dbeafe; color:#1e40af; }
    .badge-termine { background:#d1fae5; color:#065f46; }
    .badge-annulee { background:#fee2e2; color:#991b1b; }
    .dossier-date { font-size:.78rem; color:#94a3b8; margin-left:auto; }
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--gray); }
    .empty-state .es-icon { font-size:3rem; margin-bottom:1rem; }
    .empty-state h3 { font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:1.1rem; color:var(--dark); margin-bottom:.5rem; }
    .btn-primary { background:var(--blue); color:white; border:none; border-radius:var(--radius); padding:.65rem 1.25rem; font-size:.88rem; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:none; display:inline-block; transition:.15s; }
    .btn-primary:hover { background:var(--blue-hover); }
    .loading { display:flex; align-items:center; justify-content:center; padding:3rem; color:var(--gray); font-size:.9rem; gap:.75rem; }
    .spinner { width:20px; height:20px; border:2.5px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg-bubble { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:.85rem 1rem; margin-bottom:.6rem; max-width:80%; }
    .msg-bubble.mine { background:var(--blue-light); margin-left:auto; border-color:rgba(26,86,219,.2); }
    .msg-meta { font-size:.72rem; color:#94a3b8; margin-bottom:.25rem; }
    .msg-text { font-size:.87rem; color:var(--dark); line-height:1.5; }
    .msg-input-row { display:flex; gap:.75rem; margin-top:1rem; }
    .msg-input { flex:1; border:1.5px solid var(--border); border-radius:var(--radius); padding:.6rem .9rem; font-size:.88rem; font-family:inherit; }
    .msg-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-light); }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">METHOD<span>ADMIN</span></a>
  <div class="user-info">
    <span class="user-badge" id="user-name">Chargement…</span>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-section">Mon compte</div>
    <div class="sidebar-item active" onclick="showPage('dossiers', this)">📂 Mes dossiers</div>
    <div class="sidebar-item" onclick="showPage('messages', this)">💬 Messagerie</div>
    <div class="sidebar-item" onclick="showPage('documents', this)">📄 Mes documents</div>
    <div class="sidebar-section">Actions</div>
    <div class="sidebar-item" onclick="window.location.href='creation-entreprise.html'">🚀 Nouvelle demande</div>
  </nav>

  <main class="content">

    <!-- DOSSIERS -->
    <div class="page active" id="page-dossiers">
      <h1 class="page-title">Mes dossiers</h1>
      <div id="dossiers-list">
        <div class="loading"><div class="spinner"></div> Chargement de vos dossiers…</div>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="page" id="page-messages">
      <h1 class="page-title">Messagerie</h1>
      <div class="card" id="messages-selector-card">
        <label style="display:block;font-size:.82rem;font-weight:600;color:var(--dark);margin-bottom:.5rem">Choisissez un dossier</label>
        <select id="dossier-select" onchange="selectDossierForMessages(this.value)" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:.6rem .9rem;font-size:.88rem;font-family:inherit;background:var(--bg)">
          <option value="">Chargement des dossiers…</option>
        </select>
      </div>
      <div class="card" id="messages-card" style="display:none">
        <div id="messages-list" style="max-height:400px;overflow-y:auto;margin-bottom:.5rem">
          <div class="loading"><div class="spinner"></div> Chargement…</div>
        </div>
        <div class="msg-input-row">
          <input class="msg-input" type="text" id="msg-input" maxlength="1000" placeholder="Votre message…" onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessage();}">
          <button class="btn-primary" onclick="sendMessage()">Envoyer</button>
        </div>
      </div>
    </div>

    <!-- DOCUMENTS -->
    <div class="page" id="page-documents">
      <h1 class="page-title">Mes documents</h1>
      <div id="docs-list">
        <div class="loading"><div class="spinner"></div> Chargement…</div>
      </div>
    </div>

  </main>
</div>

<script>
const SUPABASE_URL = 'https://sahbhyccnkcqjzxkyzol.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhaGJoeWNjbmtjcWp6eGt5em9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDk2NTYsImV4cCI6MjA5MDE4NTY1Nn0.oFhul7RHQCCjqckmGK2jWPsLcFE9Ug9WGSqdoKVPXyo';

let db = null;
try {
  if (typeof window.supabase === 'undefined' || typeof window.supabase.createClient !== 'function') {
    throw new Error('SDK Supabase non chargé');
  }
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch (e) {
  console.error('Erreur de chargement du SDK Supabase:', e);
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#475569;text-align:center;padding:2rem"><div><p style="font-size:1.1rem;font-weight:600;margin-bottom:.5rem">Erreur de chargement</p><p>Impossible de charger l\'application. Veuillez rafraîchir la page.</p></div></div>';
}

let currentUser = null;
let myDossiers = [];
let selectedDemandeId = null;

// Le service_type réel en base est creation/modification/fermeture/autre
const svcLabels = { creation:'Création d\'entreprise', modification:'Modification', fermeture:'Fermeture / Radiation', autre:'Autre démarche' };

// Échappe le HTML pour empêcher les injections XSS via les données utilisateur
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'login-client.html'; return; }
  currentUser = session.user;

  // On récupère prénom/nom depuis le profil (table profiles), pas user_metadata (non fiable pour l'affichage mais ok ici, donnée non sensible)
  const { data: profile } = await db.from('profiles').select('prenom, nom').eq('id', currentUser.id).maybeSingle();
  document.getElementById('user-name').textContent = profile ? `${profile.prenom || ''} ${profile.nom || ''}`.trim() || currentUser.email : currentUser.email;

  await ensureClientLinked();
  await loadDossiers();
}

// S'assure qu'une ligne "clients" existe et est liée à ce compte (user_id).
// Si le client a soumis une demande via le formulaire public avant de créer un compte,
// son enregistrement clients existe déjà avec le même email mais user_id NULL : on le lie.
async function ensureClientLinked() {
  const { data: existing } = await db.from('clients').select('id, user_id').eq('email', currentUser.email).maybeSingle();
  if (existing && !existing.user_id) {
    await db.from('clients').update({ user_id: currentUser.id }).eq('id', existing.id);
  } else if (!existing) {
    const { data: profile } = await db.from('profiles').select('prenom, nom, telephone').eq('id', currentUser.id).maybeSingle();
    await db.from('clients').insert({
      user_id: currentUser.id,
      prenom: profile?.prenom || '',
      nom: profile?.nom || '',
      email: currentUser.email,
      telephone: profile?.telephone || null
    });
  }
}

async function loadDossiers() {
  const container = document.getElementById('dossiers-list');
  const { data, error } = await db.from('vue_dossier_client').select('*').order('created_at', { ascending: false });
  myDossiers = data || [];

  if (error || myDossiers.length === 0) {
    container.innerHTML = emptyState('📂', 'Aucun dossier pour l\'instant', 'Commencez par soumettre une demande.') + '<div style="text-align:center;margin-top:1rem"><a href="creation-entreprise.html" class="btn-primary">🚀 Créer mon entreprise</a></div>';
    populateDossierSelect();
    return;
  }

  container.innerHTML = myDossiers.map(d => `
    <div class="dossier-card">
      <div>
        <div class="dossier-ref">${escapeHtml(d.reference)}</div>
        <div class="dossier-service">${escapeHtml(svcLabels[d.service] || d.service)}${d.total_ttc ? ` · ${d.total_ttc} € TTC` : ''}</div>
      </div>
      <span class="badge badge-${d.statut}">${statutLabel(d.statut)}</span>
      ${d.messages_non_lus > 0 ? `<span class="badge" style="background:#fee2e2;color:#991b1b">${d.messages_non_lus} message(s)</span>` : ''}
      <span class="dossier-date">${new Date(d.created_at).toLocaleDateString('fr-FR')}</span>
    </div>
  `).join('');

  populateDossierSelect();
}

function populateDossierSelect() {
  const sel = document.getElementById('dossier-select');
  if (myDossiers.length === 0) {
    sel.innerHTML = '<option value="">Aucun dossier disponible</option>';
    document.getElementById('messages-card').style.display = 'none';
    return;
  }
  sel.innerHTML = '<option value="">— Sélectionnez un dossier —</option>' +
    myDossiers.map(d => `<option value="${d.id}">${escapeHtml(d.reference)} (${escapeHtml(svcLabels[d.service] || d.service)})</option>`).join('');
}

function selectDossierForMessages(demandeId) {
  selectedDemandeId = demandeId || null;
  const card = document.getElementById('messages-card');
  if (!selectedDemandeId) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  loadMessages();
}

async function loadMessages() {
  const container = document.getElementById('messages-list');
  if (!selectedDemandeId) { container.innerHTML = ''; return; }
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement…</div>';
  const { data } = await db.from('messages').select('*').eq('demande_id', selectedDemandeId).order('created_at', { ascending: true });
  if (!data || data.length === 0) { container.innerHTML = '<p style="text-align:center;color:var(--gray);font-size:.85rem;padding:1rem">Aucun message pour l\'instant.</p>'; return; }
  container.innerHTML = data.map(m => `
    <div class="msg-bubble ${m.auteur_id === currentUser.id ? 'mine' : ''}">
      <div class="msg-meta">${m.auteur_id === currentUser.id ? 'Vous' : 'MethodAdmin'} · ${new Date(m.created_at).toLocaleString('fr-FR')}</div>
      <div class="msg-text">${escapeHtml(m.contenu)}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
  // Marquer les messages reçus comme lus
  await db.from('messages').update({ lu: true }).eq('demande_id', selectedDemandeId).neq('auteur_id', currentUser.id);
}

async function loadDocuments() {
  const container = document.getElementById('docs-list');
  if (myDossiers.length === 0) { container.innerHTML = emptyState('📄', 'Vos documents apparaîtront ici', 'L\'équipe vous demandera de fournir des pièces justificatives selon votre dossier.'); return; }
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement…</div>';

  let html = '';
  for (const d of myDossiers) {
    const { data: requis } = await db.from('documents_requis').select('*').eq('demande_id', d.id);
    const { data: deposes } = await db.from('documents_clients').select('*').eq('demande_id', d.id);
    if (!requis || requis.length === 0) continue;

    html += `<div class="card" style="margin-bottom:1rem">
      <div style="font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:.75rem">${escapeHtml(d.reference)}</div>`;

    for (const r of requis) {
      const depose = (deposes || []).find(dc => dc.document_requis_id === r.id);
      const statutTxt = depose ? (depose.statut === 'valide' ? '✅ Validé' : depose.statut === 'rejete' ? '❌ Rejeté — à renvoyer' : '⏳ En attente de validation') : '📋 À fournir';
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:.85rem;font-weight:600;color:var(--dark)">${escapeHtml(r.nom)}${r.obligatoire ? ' <span style="color:#ef4444">*</span>' : ''}</div>
          <div style="font-size:.78rem;color:var(--gray)">${escapeHtml(r.description) || ''} — ${statutTxt}</div>
        </div>
        <div>
          ${!depose || depose.statut === 'rejete' ? `<input type="file" id="file-${r.id}" accept="application/pdf,image/jpeg,image/png,image/webp" style="display:none" onchange="uploadDocument('${d.id}','${r.id}',this)"><button class="btn-primary" style="font-size:.78rem;padding:.4rem .8rem" onclick="document.getElementById('file-${r.id}').click()">Téléverser</button>` : ''}
        </div>
      </div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html || emptyState('📄', 'Aucun document requis pour le moment', 'L\'équipe vous indiquera les pièces à fournir une fois votre dossier étudié.');
}

async function uploadDocument(demandeId, documentRequisId, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('Le fichier dépasse la taille maximale autorisée (10 Mo).'); return; }
  const allowedTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/webp'];
  if (!allowedTypes.includes(file.type)) { alert('Type de fichier non autorisé. Formats acceptés : PDF, JPEG, PNG, WEBP.'); return; }

  const path = `${demandeId}/${Date.now()}_${file.name}`;
  const { error: uploadError } = await db.storage.from('documents-clients').upload(path, file);
  if (uploadError) { alert('Erreur lors du téléversement : ' + uploadError.message); return; }

  const { error: insertError } = await db.from('documents_clients').insert({
    demande_id: demandeId,
    document_requis_id: documentRequisId,
    nom_fichier: file.name,
    storage_path: path,
    taille_bytes: file.size,
    mime_type: file.type,
    statut: 'en_attente'
  });
  if (insertError) { alert('Erreur lors de l\'enregistrement du document : ' + insertError.message); return; }

  await loadDocuments();
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const txt = input.value.trim();
  if (!txt) return;
  if (!selectedDemandeId) { alert('Veuillez sélectionner un dossier.'); return; }
  const { error } = await db.from('messages').insert({ demande_id: selectedDemandeId, auteur_id: currentUser.id, contenu: txt });
  if (error) { alert('Erreur lors de l\'envoi du message. Veuillez réessayer.'); return; }
  input.value = '';
  await loadMessages();
}

function emptyState(icon, title, desc) {
  return `<div class="empty-state"><div class="es-icon">${icon}</div><h3>${title}</h3><p>${desc}</p></div>`;
}

function statutLabel(s) {
  const l = { nouvelle:'Nouvelle demande', en_etude:'En étude', devis_envoye:'Devis envoyé', devis_valide:'Devis accepté', docs_attente:'Documents requis', en_traitement:'En traitement', termine:'Terminé ✅', annulee:'Annulé' };
  return l[s] || s;
}

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'documents') loadDocuments();
}

async function logout() {
  await db.auth.signOut();
  window.location.href = 'login-client.html';
}

if (db) init();
</script>
</body>
</html>
