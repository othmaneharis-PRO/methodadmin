<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — MethodAdmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#1a56db;--blue-hover:#1240b0;--blue-light:#e8f0fe;--dark:#0f172a;--gray:#475569;--bg:#f7f8fc;--white:#fff;--border:#e2e8f0;--radius:10px; }
    body { font-family:'Nunito Sans',system-ui,sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; display:flex; flex-direction:column; }
    header { background:rgba(255,255,255,.97); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; height:64px; }
    .logo { font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:1.2rem; color:var(--blue); text-decoration:none; }
    .logo span { color:var(--dark); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    .card { background:white; border:1px solid var(--border); border-radius:20px; padding:2.25rem; width:100%; max-width:440px; box-shadow:0 4px 24px rgba(26,86,219,.10); }
    .card-title { font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:1.4rem; color:var(--dark); margin-bottom:.3rem; }
    .card-sub { font-size:.85rem; color:var(--gray); margin-bottom:1.5rem; }
    .tabs { display:flex; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:1.5rem; }
    .tab { flex:1; padding:.6rem; text-align:center; font-size:.85rem; font-weight:600; cursor:pointer; color:var(--gray); background:var(--bg); transition:.15s; border:none; font-family:inherit; }
    .tab.active { background:var(--blue); color:white; }
    .mode-tabs { display:flex; gap:.5rem; margin-bottom:1.25rem; }
    .mode-tab { flex:1; padding:.5rem; text-align:center; font-size:.82rem; font-weight:600; cursor:pointer; color:var(--gray); background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius); transition:.15s; }
    .mode-tab.active { border-color:var(--blue); color:var(--blue); background:var(--blue-light); }
    .field { margin-bottom:.85rem; }
    label { display:block; font-size:.82rem; font-weight:600; color:var(--dark); margin-bottom:.3rem; }
    input { width:100%; border:1.5px solid var(--border); border-radius:var(--radius); padding:.65rem .9rem; font-size:.9rem; color:var(--dark); background:var(--bg); font-family:inherit; transition:.15s; }
    input:focus { outline:none; border-color:var(--blue); background:white; box-shadow:0 0 0 3px var(--blue-light); }
    .btn { width:100%; padding:.75rem; border-radius:var(--radius); font-size:.92rem; font-weight:700; cursor:pointer; border:none; font-family:inherit; transition:.15s; }
    .btn-primary { background:var(--blue); color:white; }
    .btn-primary:hover { background:var(--blue-hover); }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .alert { display:none; border-radius:var(--radius); padding:.7rem 1rem; font-size:.84rem; margin-bottom:1rem; }
    .alert.show { display:block; }
    .alert-error { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
    .alert-success { background:#f0fdf4; border:1px solid #bbf7d0; color:#15803d; }
    .divider { text-align:center; font-size:.78rem; color:#94a3b8; margin:.85rem 0; position:relative; }
    .divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border); }
    .divider span { background:white; padding:0 .75rem; position:relative; }
    .link-btn { background:none; border:none; color:var(--blue); font-size:.83rem; cursor:pointer; font-family:inherit; text-decoration:underline; }
    .loader { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:white; border-radius:50%; animation:spin .65s linear infinite; vertical-align:middle; margin-left:.4rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">METHOD<span>ADMIN</span></a>
</header>
<main>
  <div class="card">
    <h1 class="card-title" id="card-title">Mon espace</h1>
    <p class="card-sub" id="card-sub">Connectez-vous pour accéder à vos dossiers</p>

    <!-- Tabs : Client / Admin -->
    <div class="tabs">
      <button class="tab active" onclick="switchSpace('client')">Espace Client</button>
      <button class="tab" onclick="switchSpace('admin')">Administration</button>
    </div>

    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <!-- Mode : Login / Inscription / Reset -->
    <div class="mode-tabs" id="mode-tabs">
      <div class="mode-tab active" onclick="switchMode('login')">Connexion</div>
      <div class="mode-tab" onclick="switchMode('register')" id="tab-register">Créer un compte</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="field"><label for="email">Email</label><input type="email" id="email" placeholder="jean@email.com" autocomplete="email"></div>
      <div class="field"><label for="password">Mot de passe</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-primary" onclick="doLogin()" id="btn-login">Se connecter</button>
      <div class="divider"><span>ou</span></div>
      <div style="text-align:center">
        <button class="link-btn" onclick="switchMode('reset')">Mot de passe oublié ?</button>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="field"><label>Prénom</label><input type="text" id="reg-prenom" placeholder="Jean"></div>
        <div class="field"><label>Nom</label><input type="text" id="reg-nom" placeholder="Dupont"></div>
      </div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="jean@email.com"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="reg-password" placeholder="8 caractères minimum"></div>
      <div class="field"><label>Confirmer le mot de passe</label><input type="password" id="reg-confirm" placeholder="••••••••"></div>
      <button class="btn btn-primary" onclick="doRegister()" id="btn-register">Créer mon compte</button>
    </div>

    <!-- RESET FORM -->
    <div id="form-reset" style="display:none">
      <p style="font-size:.85rem;color:var(--gray);margin-bottom:1rem">Saisissez votre email pour recevoir un lien de réinitialisation.</p>
      <div class="field"><label>Email</label><input type="email" id="reset-email" placeholder="jean@email.com"></div>
      <button class="btn btn-primary" onclick="doReset()" id="btn-reset">Envoyer le lien</button>
      <div style="text-align:center;margin-top:.85rem">
        <button class="link-btn" onclick="switchMode('login')">← Retour à la connexion</button>
      </div>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://sahbhyccnkcqjzxkyzol.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhaGJoeWNjbmtjcWp6eGt5em9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkwNjcxNzEsImV4cCI6MjA2NDY0MzE3MX0.Bla_IH6RjvV4OyUVqtb26Jlp8hqOFhul7RHQCCjqckmGK2jWPsLcFE9Ug9WGSqdoKVPXyo';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSpace = 'client';
let currentMode = 'login';

function showError(msg) { const el=document.getElementById('alert-error'); el.textContent=msg; el.classList.add('show'); document.getElementById('alert-success').classList.remove('show'); }
function showSuccess(msg) { const el=document.getElementById('alert-success'); el.textContent=msg; el.classList.add('show'); document.getElementById('alert-error').classList.remove('show'); }
function clearAlerts() { document.getElementById('alert-error').classList.remove('show'); document.getElementById('alert-success').classList.remove('show'); }

function switchSpace(space) {
  currentSpace = space;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&space==='client')||(i===1&&space==='admin')));
  document.getElementById('tab-register').style.display = space==='admin' ? 'none' : '';
  document.getElementById('card-title').textContent = space==='admin' ? 'Administration' : 'Mon espace';
  document.getElementById('card-sub').textContent = space==='admin' ? 'Accès réservé aux administrateurs' : 'Connectez-vous pour accéder à vos dossiers';
  switchMode('login');
  clearAlerts();
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('form-login').style.display = mode==='login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = mode==='register' ? 'block' : 'none';
  document.getElementById('form-reset').style.display = mode==='reset' ? 'block' : 'none';
  document.getElementById('mode-tabs').style.display = mode==='reset' ? 'none' : 'flex';
  clearAlerts();
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return showError('Veuillez remplir tous les champs.');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.innerHTML = 'Connexion…<span class="loader"></span>';
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) { showError('Email ou mot de passe incorrect.'); btn.disabled=false; btn.textContent='Se connecter'; return; }
  if (currentSpace === 'admin') {
    // SÉCURITÉ : on vérifie app_metadata (modifiable uniquement côté serveur via service_role),
    // jamais user_metadata (que l'utilisateur peut modifier lui-même via auth.updateUser()).
    const role = data.user?.app_metadata?.role;
    if (role !== 'admin') { await supabase.auth.signOut(); showError('Accès refusé. Ce compte n\'a pas les droits administrateur.'); btn.disabled=false; btn.textContent='Se connecter'; return; }
    window.location.href = 'espace-admin.html';
  } else {
    window.location.href = 'espace-client.html';
  }
}

async function doRegister() {
  const prenom = document.getElementById('reg-prenom').value.trim();
  const nom = document.getElementById('reg-nom').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  if (!prenom||!nom||!email||!password) return showError('Veuillez remplir tous les champs.');
  if (password.length < 8) return showError('Le mot de passe doit contenir au moins 8 caractères.');
  if (password !== confirm) return showError('Les mots de passe ne correspondent pas.');
  const btn = document.getElementById('btn-register');
  btn.disabled=true; btn.innerHTML='Création…<span class="loader"></span>';
  const { error } = await supabase.auth.signUp({ email, password, options: { data: { prenom, nom, role: 'client' } } });
  if (error) { showError(error.message); btn.disabled=false; btn.textContent='Créer mon compte'; return; }
  showSuccess('Compte créé ! Vérifiez votre email pour confirmer votre inscription.');
  btn.disabled=false; btn.textContent='Créer mon compte';
}

async function doReset() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) return showError('Veuillez saisir votre adresse email.');
  const btn = document.getElementById('btn-reset');
  btn.disabled=true; btn.innerHTML='Envoi…<span class="loader"></span>';
  const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset-password.html' });
  if (error) { showError('Erreur : ' + error.message); } else { showSuccess('Lien de réinitialisation envoyé ! Vérifiez votre boîte mail.'); }
  btn.disabled=false; btn.textContent='Envoyer le lien';
}

// Enter key support
document.addEventListener('keydown', (e) => { if (e.key==='Enter') { if(currentMode==='login') doLogin(); else if(currentMode==='register') doRegister(); else if(currentMode==='reset') doReset(); } });
</script>
</body>
</html>
