<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation — MethodAdmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue:#1a56db;--blue-hover:#1240b0;--blue-light:#e8f0fe;--dark:#0f172a;--gray:#475569;--bg:#f7f8fc;--border:#e2e8f0;--radius:10px; }
    body { font-family:'Nunito Sans',system-ui,sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; display:flex; flex-direction:column; }
    header { background:rgba(255,255,255,.97); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; height:64px; }
    .logo { font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:1.2rem; color:var(--blue); text-decoration:none; }
    .logo span { color:var(--dark); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:white; border:1px solid var(--border); border-radius:20px; padding:2.25rem; width:100%; max-width:420px; box-shadow:0 4px 24px rgba(26,86,219,.10); }
    h1 { font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:1.35rem; margin-bottom:.3rem; }
    .sub { font-size:.85rem; color:var(--gray); margin-bottom:1.5rem; }
    .field { margin-bottom:.85rem; }
    label { display:block; font-size:.82rem; font-weight:600; color:var(--dark); margin-bottom:.3rem; }
    input { width:100%; border:1.5px solid var(--border); border-radius:var(--radius); padding:.65rem .9rem; font-size:.9rem; color:var(--dark); background:var(--bg); font-family:inherit; }
    input:focus { outline:none; border-color:var(--blue); background:white; box-shadow:0 0 0 3px var(--blue-light); }
    .btn { width:100%; padding:.75rem; border-radius:var(--radius); font-size:.92rem; font-weight:700; cursor:pointer; border:none; font-family:inherit; background:var(--blue); color:white; transition:.15s; }
    .btn:hover:not(:disabled) { background:var(--blue-hover); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-secondary { background:transparent; color:var(--blue); border:1.5px solid var(--blue); margin-top:.5rem; }
    .alert { border-radius:var(--radius); padding:.7rem 1rem; font-size:.84rem; margin-bottom:1rem; display:none; line-height:1.5; }
    .alert.show { display:block; }
    .alert-error { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
    .alert-success { background:#f0fdf4; border:1px solid #bbf7d0; color:#15803d; }
    .alert-warn { background:#fef9c3; border:1px solid #facc15; color:#713f12; }
    .loader { display:inline-block; width:18px; height:18px; border:2.5px solid var(--blue-light); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status-text { text-align:center; color:var(--gray); font-size:.88rem; margin:1rem 0; }
  </style>
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
<header><a href="index.html" class="logo">METHOD<span>ADMIN</span></a></header>
<main>
  <div class="card">
    <h1>Nouveau mot de passe</h1>
    <p class="sub">Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>

    <div class="alert alert-error" id="err"></div>
    <div class="alert alert-success" id="ok"></div>
    <div class="alert alert-warn" id="warn"></div>

    <!-- Etat 1 : Chargement / vérification du lien -->
    <div id="loading-state">
      <p class="status-text"><span class="loader"></span> &nbsp;Vérification du lien de réinitialisation...</p>
    </div>

    <!-- Etat 2 : Formulaire (affiché si lien valide) -->
    <div id="form-wrap" style="display:none">
      <div class="field"><label>Nouveau mot de passe</label><input type="password" id="pw1" placeholder="8 caractères minimum" autocomplete="new-password"></div>
      <div class="field"><label>Confirmer le mot de passe</label><input type="password" id="pw2" placeholder="••••••••" autocomplete="new-password"></div>
      <button class="btn" id="btn-save" onclick="doReset()">Enregistrer le nouveau mot de passe</button>
    </div>

    <!-- Etat 3 : Lien invalide ou expiré -->
    <div id="invalid-state" style="display:none">
      <a href="login-client.html" class="btn" style="text-align:center;display:block;text-decoration:none">Retour à la connexion</a>
    </div>
  </div>
</main>
<script>
const SUPABASE_URL = 'https://sahbhyccnkcqjzxkyzol.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhaGJoeWNjbmtjcWp6eGt5em9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDk2NTYsImV4cCI6MjA5MDE4NTY1Nn0.oFhul7RHQCCjqckmGK2jWPsLcFE9Ug9WGSqdoKVPXyo';

let db = null;
let isReady = false; // session de récupération valide ?

function showError(msg) {
  const e = document.getElementById('err');
  e.innerHTML = msg;
  e.classList.add('show');
}
function hideError() { document.getElementById('err').classList.remove('show'); }
function showWarn(msg) {
  const e = document.getElementById('warn');
  e.innerHTML = msg;
  e.classList.add('show');
}
function setState(state) {
  document.getElementById('loading-state').style.display = state === 'loading' ? 'block' : 'none';
  document.getElementById('form-wrap').style.display    = state === 'form'    ? 'block' : 'none';
  document.getElementById('invalid-state').style.display= state === 'invalid' ? 'block' : 'none';
}

try {
  if (typeof window.supabase === 'undefined' || typeof window.supabase.createClient !== 'function') {
    throw new Error('SDK Supabase non chargé');
  }
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { detectSessionInUrl: true, flowType: 'pkce', persistSession: true, autoRefreshToken: true }
  });
} catch (e) {
  console.error('Erreur de chargement du SDK Supabase:', e);
  showError('Erreur technique : impossible de charger le système d\'authentification. Rafraîchissez la page.');
  setState('invalid');
}

// ----- DETECTION DU LIEN DE RÉCUPÉRATION -----
async function initRecoverySession() {
  if (!db) return;
  try {
    // 1) Si présence d'un code dans l'URL (flux PKCE), on l'échange
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const errorParam = urlParams.get('error') || urlParams.get('error_description');

    if (errorParam) {
      showError('Lien invalide ou expiré : ' + decodeURIComponent(errorParam) + '<br><br>Demandez un nouveau lien depuis la page de connexion.');
      setState('invalid');
      return;
    }

    if (code) {
      const { error } = await db.auth.exchangeCodeForSession(code);
      if (error) {
        console.error('exchangeCodeForSession error:', error);
        showError('Lien invalide ou déjà utilisé.<br>Demandez un nouveau lien depuis la page de connexion.');
        setState('invalid');
        return;
      }
      // Nettoie l'URL
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    // 2) Si présence d'access_token dans le hash (flux legacy)
    if (window.location.hash && window.location.hash.includes('access_token')) {
      // Le SDK auto-détecte le hash, on attend la propagation
      await new Promise(r => setTimeout(r, 300));
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    // 3) Vérifie qu'on a bien une session
    const { data: { session } } = await db.auth.getSession();
    if (session && session.user) {
      isReady = true;
      setState('form');
      document.getElementById('pw1').focus();
      return;
    }

    // Aucun token et pas de session : lien manquant
    showError('Aucun lien de réinitialisation détecté.<br>Pour réinitialiser votre mot de passe, demandez un nouveau lien depuis la page de connexion.');
    setState('invalid');
  } catch (e) {
    console.error('initRecoverySession:', e);
    showError('Une erreur est survenue. Veuillez réessayer ou demander un nouveau lien.');
    setState('invalid');
  }
}

// ----- ECOUTE DE L'EVENT PASSWORD_RECOVERY (flow hash) -----
if (db) {
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY' && session) {
      isReady = true;
      setState('form');
    }
  });
  // Lance la détection au chargement
  initRecoverySession();
}

// ----- SOUMISSION DU NOUVEAU MOT DE PASSE -----
async function doReset() {
  hideError();
  if (!db || !isReady) {
    showError('Session de réinitialisation invalide. Veuillez recommencer.');
    return;
  }
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1.length < 8) return showError('Le mot de passe doit contenir au moins 8 caractères.');
  if (pw1 !== pw2) return showError('Les mots de passe ne correspondent pas.');

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Mise à jour...';

  const { error } = await db.auth.updateUser({ password: pw1 });
  if (error) {
    btn.disabled = false; btn.textContent = 'Enregistrer le nouveau mot de passe';
    return showError(error.message || 'Une erreur est survenue.');
  }
  document.getElementById('ok').textContent = '✅ Mot de passe mis à jour ! Redirection vers la connexion...';
  document.getElementById('ok').classList.add('show');
  document.getElementById('form-wrap').style.display = 'none';
  // Déconnexion explicite puis redirection
  await db.auth.signOut();
  setTimeout(() => window.location.href = 'login-client.html', 2500);
}
</script>
<script src="cookies-banner.js"></script>
</body>
</html>
